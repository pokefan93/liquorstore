<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 240 240"
  role="img"
  aria-labelledby="logo-title logo-desc"
>
  <title id="logo-title">Bella Vista Wine and Spirits logo</title>
  <desc id="logo-desc">A circular logo with the letters B V W S around a grape cluster.</desc>
  <defs>
    <radialGradient id="paper" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f6f1e8" />
    </radialGradient>
    <linearGradient id="grape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7e4ab3" />
      <stop offset="55%" stop-color="#5b2a8d" />
      <stop offset="100%" stop-color="#3f1d67" />
    </linearGradient>
    <linearGradient id="stem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccb274" />
      <stop offset="100%" stop-color="#a78843" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#251b17" flood-opacity="0.16" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="120" cy="120" r="108" fill="url(#paper)" />
    <circle cx="120" cy="120" r="104" fill="none" stroke="#241a17" stroke-width="7" />
    <circle cx="120" cy="120" r="96" fill="none" stroke="#d9c29d" stroke-width="2.5" />
  </g>

  <g fill="#12100f" font-family="Georgia, serif" font-weight="700" font-size="33">
    <text x="34" y="111" transform="rotate(-18 34 111)">B</text>
    <text x="86" y="53" transform="rotate(-8 86 53)">V</text>
    <text x="133" y="54" transform="rotate(8 133 54)">W</text>
    <text x="185" y="112" transform="rotate(18 185 112)">S</text>
  </g>

  <g stroke="url(#stem)" stroke-linecap="round" fill="none">
    <path d="M118 85C128 79 143 80 152 90" stroke-width="5" />
    <path d="M120 83C109 73 95 70 83 74" stroke-width="4" />
    <path d="M146 84L165 66" stroke-width="3" />
    <path d="M152 92L171 79" stroke-width="3" />
  </g>

  <g fill="#6b8544" stroke="#496033" stroke-width="2">
    <path d="M95 84C88 75 76 73 68 80C76 91 88 95 98 91Z" />
    <path d="M126 81C137 70 151 70 161 80C151 92 138 95 128 90Z" />
  </g>

  <g fill="url(#grape)" stroke="#43215f" stroke-width="2">
    <circle cx="102" cy="106" r="15" />
    <circle cx="121" cy="104" r="15" />
    <circle cx="139" cy="108" r="15" />
    <circle cx="92" cy="126" r="15" />
    <circle cx="111" cy="126" r="15" />
    <circle cx="130" cy="126" r="15" />
    <circle cx="149" cy="127" r="15" />
    <circle cx="101" cy="146" r="15" />
    <circle cx="120" cy="146" r="15" />
    <circle cx="139" cy="146" r="15" />
    <circle cx="110" cy="166" r="15" />
    <circle cx="129" cy="166" r="15" />
  </g>

  <g fill="#ffffff" opacity="0.18">
    <circle cx="96" cy="101" r="4" />
    <circle cx="116" cy="100" r="4" />
    <circle cx="134" cy="104" r="4" />
    <circle cx="106" cy="141" r="4" />
    <circle cx="124" cy="161" r="4" />
  </g>
</svg>
