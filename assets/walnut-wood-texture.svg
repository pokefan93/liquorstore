<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Generated walnut wood texture</title>
  <desc id="desc">A generated walnut wood grain texture in warm brown tones.</desc>
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a2b1f" />
      <stop offset="0.24" stop-color="#6a4230" />
      <stop offset="0.52" stop-color="#5a3527" />
      <stop offset="0.78" stop-color="#7a4b34" />
      <stop offset="1" stop-color="#513022" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9ab73" stop-opacity="0.16" />
      <stop offset="0.4" stop-color="#f0d4ad" stop-opacity="0.05" />
      <stop offset="1" stop-color="#160d09" stop-opacity="0.16" />
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.008 0.34"
        numOctaves="2"
        seed="17"
        stitchTiles="stitch"
        result="noise"
      />
      <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
      <feComponentTransfer in="mono" result="grainFade">
        <feFuncA type="table" tableValues="0 0.08" />
      </feComponentTransfer>
    </filter>
    <filter id="soften" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.7" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#base)" />

